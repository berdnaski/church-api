version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: church_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: church
    ports:
      - '5432:5432'
    volumes:
      - church_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  church_pgdata:
